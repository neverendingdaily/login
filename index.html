<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNS Marketing Portal</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text x=%2250%%22 y=%2250%%22 style=%22dominant-baseline:central;text-anchor:middle;font-size:90px;%22>🚀</text></svg>">
    <style>
        :root{--bg-color:#fcfaf2;--card-bg:#fff;--card-hover:#fdfdf8;--text-main:#2c2925;--text-sub:#787168;--border-color:#ede8d9;--primary:#0369a1}
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:var(--bg-color);color:var(--text-main);margin:0;padding:2rem;display:flex;justify-content:center}
        
        /* コンテナの最大幅を広げ、PCで多列表示（最大6列程度）を可能にする */
        .container{max-width:1400px;width:100%}
        
        .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem; flex-wrap:wrap; gap:1rem;}
        h1{font-size:1.8rem;margin:0;letter-spacing:.05em}
        
        /* コントロールパネルのスタイル */
        .controls-top{display:flex;gap:0.5rem;}
        button{cursor:pointer;padding:0.5rem 1rem;border:none;border-radius:6px;font-weight:bold;font-size:0.9rem;transition:all 0.2s;}
        .btn-edit{background:#e2e8f0;color:#334155;}
        .btn-edit.active{background:#ef4444;color:white;}
        .btn-export{background:var(--primary);color:white;}
        
        /* フォームのスタイル */
        .add-form{background:#fff;padding:1.5rem;border-radius:12px;border:1px solid var(--border-color);margin-bottom:2rem;display:none;grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));gap:1rem;}
        .add-form.active{display:grid;}
        .form-group{display:flex;flex-direction:column;gap:0.3rem;}
        .form-group input, .form-group select{padding:0.5rem;border:1px solid #cbd5e1;border-radius:4px;font-size:0.9rem;}
        .form-full{grid-column:1 / -1;}
        .btn-add{background:#10b981;color:white;padding:0.8rem;grid-column:1 / -1;}

        /* 可変グリッド: ブラウザ幅に合わせて自動で列数が変わる（minmaxで最小幅を200pxに設定） */
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1.5rem}
        
        .card{background:var(--card-bg);border-radius:12px;padding:1.5rem;text-decoration:none;color:var(--text-main);transition:all .2s ease;border:1px solid var(--border-color);display:flex;flex-direction:column;box-shadow:0 2px 8px rgba(0,0,0,.02);position:relative;}
        .card:hover{transform:translateY(-3px);border-color:#cbd5e1;box-shadow:0 10px 20px rgba(0,0,0,.06)}
        
        .icon-wrap{font-size:2rem;margin-bottom:1rem;line-height:1}
        .favicon-img{width:40px;height:40px;object-fit:contain;border-radius:6px}
        .title{font-size:1.1rem;font-weight:bold;margin-bottom:.5rem}
        .desc{font-size:.85rem;color:var(--text-sub);line-height:1.4;flex-grow:1;}
        .badge{display:inline-block;padding:.2rem .5rem;border-radius:4px;font-size:.7rem;font-weight:bold;margin-bottom:1rem;width:fit-content}
        
        /* 編集モード時のカードのオーバーレイとボタン */
        .card-edit-overlay{display:none;position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,0.9);border-radius:12px;flex-direction:column;justify-content:center;align-items:center;gap:0.5rem;z-index:10;}
        .edit-mode .card-edit-overlay{display:flex;}
        .edit-mode.card:hover{transform:none;}
        .action-btn{padding:0.4rem 1rem;font-size:1.2rem;background:#f1f5f9;border:1px solid #cbd5e1;}
        .action-btn:hover{background:#e2e8f0;}
        .delete-btn{background:#fee2e2;color:#ef4444;border-color:#fca5a5;}
        
        .bg-blue{background:#e0f2fe;color:#0369a1}.bg-green{background:#dcfce7;color:#15803d}.bg-purple{background:#f3e8ff;color:#7e22ce}.bg-orange{background:#ffedd5;color:#c2410c}.bg-gray{background:#f3f4f6;color:#4b5563}.bg-red{background:#fee2e2;color:#b91c1c}.bg-yellow{background:#fef9c3;color:#854d0e}.bg-teal{background:#ccfbf1;color:#0f766e}
        
        /* ▼▼▼ Firebaseログイン画面用CSS ▼▼▼ */
        .hidden { display: none !important; }
        #login-section {
            background: #fff;
            padding: 3rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            text-align: center;
            max-width: 400px;
            margin: 100px auto;
            box-shadow: 0 10px 20px rgba(0,0,0,.06);
            /* 中央に配置するための調整 */
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
        }
        #login-section h2 { margin-top: 0; color: var(--primary); }
        .btn-login {
            background: #4285F4;
            color: white;
            padding: 10px 20px;
            font-size: 1.1rem;
            border-radius: 6px;
            margin-top: 20px;

        }
        .btn-login:hover { background: #3367D6; }
        .user-info {

            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            font-weight: bold;
        }
        .btn-logout {
            background: #f1f5f9;
            color: #334155;

            font-size: 0.8rem;
        }

        @media (max-width: 600px) {
            .header { flex-direction: column; text-align: center; }
        }
    </style>
</head>

<script>
// JSONブロックから初期データを読み込み、ローカルストレージがあれば上書きする
const dataScript = document.getElementById('site-data');
let originalData = JSON.parse(dataScript.textContent);
let L = JSON.parse(localStorage.getItem('my_portal_data')) || originalData;

let isEditMode = false;

// 描画関数
function renderCards() {
    const g = document.getElementById('g');
    g.innerHTML = '';
    
    L.forEach((l, index) => {
        // 編集モード時はリンクを無効化するためにdivを使う
        const wrapper = document.createElement(isEditMode ? 'div' : 'a');
        if(!isEditMode) {
            wrapper.href = l.url;
            wrapper.target = '_blank';
        }
        wrapper.className = 'card' + (isEditMode ? ' edit-mode' : '');
        
        const hasEmoji = l.icon && l.icon.trim() !== '';
        const fav = (u) => { try{ return 'https://www.google.com/s2/favicons?sz=64&domain=' + encodeURIComponent(new URL(u).hostname); }catch(e){ return ''; } }
        
        const ico = hasEmoji
            ? `<div class="icon-wrap">${l.icon}</div>`
            : `<div class="icon-wrap"><img class="favicon-img" src="${fav(l.url)}" alt="" onerror="this.style.display='none'"></div>`;
            
        let inner = `<span class="badge ${l.badgeClass}">${l.badgeText}</span>${ico}<div class="title">${l.title}</div><div class="desc">${l.desc}</div>`;
        
        // 編集モード用オーバーレイ
        if(isEditMode) {
            inner += `
            <div class="card-edit-overlay">
                <div style="display:flex;gap:0.5rem;margin-bottom:0.5rem;">
                    <button class="action-btn" onclick="moveUp(${index}, event)">◀ 前へ</button>
                    <button class="action-btn" onclick="moveDown(${index}, event)">次へ ▶</button>
                </div>
                <button class="action-btn delete-btn" onclick="deleteSite(${index}, event)">🗑️ 削除</button>
            </div>`;
        }
        
        wrapper.innerHTML = inner;
        g.appendChild(wrapper);
    });
}

// 編集モード切替
function toggleEditMode() {
    isEditMode = !isEditMode;
    const btn = document.getElementById('toggle-edit');
    const form = document.getElementById('add-form');
    
    if(isEditMode) {
        btn.textContent = "編集モード OFF";
        btn.classList.add('active');
        form.classList.add('active');
    } else {
        btn.textContent = "編集モード ON";
        btn.classList.remove('active');
        form.classList.remove('active');
    }
    renderCards();
}

// データの操作
function saveData() {
    localStorage.setItem('my_portal_data', JSON.stringify(L));
    renderCards();
}

function moveUp(index, event) {
    event.stopPropagation();
    if(index > 0) {
        [L[index - 1], L[index]] = [L[index], L[index - 1]];
        saveData();
    }
}

function moveDown(index, event) {
    event.stopPropagation();
    if(index < L.length - 1) {
        [L[index + 1], L[index]] = [L[index], L[index + 1]];
        saveData();
    }
}

function deleteSite(index, event) {
    event.stopPropagation();
    if(confirm("このサイトをリストから削除しますか？")) {
        L.splice(index, 1);
        saveData();
    }
}

function addSite() {
    const title = document.getElementById('f-title').value;
    const url = document.getElementById('f-url').value;
    if(!title || !url) return alert("タイトルとURLは必須です");
    
    const newSite = {
        title: title,
        url: url,
        icon: document.getElementById('f-icon').value,
        badgeText: document.getElementById('f-badge-text').value || "New",
        badgeClass: document.getElementById('f-badge-class').value,
        desc: document.getElementById('f-desc').value
    };
    
    L.push(newSite);
    saveData();
    
    // 入力リセット
    document.getElementById('f-title').value = '';
    document.getElementById('f-url').value = '';
    document.getElementById('f-desc').value = '';
    alert("追加しました！一番下に追加されています。");
}

// HTMLエクスポート（このマジックでサーバー不要になります！）
function exportHTML() {
    // 現在のデータをJSONスクリプトブロックに書き戻す
    dataScript.textContent = "\n" + JSON.stringify(L, null, 2) + "\n";
    
    // 編集モードを一時的に解除（出力ファイルに編集状態を含めないため）
    const wasEditMode = isEditMode;
    if(wasEditMode) toggleEditMode();
    
    // 描画エリアを一回空にする（重複描画を防ぐため）
    document.getElementById('g').innerHTML = '';
    
    // 現在のHTML全体を取得
    const htmlContent = "<!DOCTYPE html>\n<html lang=\"ja\">\n" + document.documentElement.innerHTML + "\n</html>";
    
    // ダウンロード用リンクを作成してクリック
    const blob = new Blob([htmlContent], { type: "text/html" });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = "sns-portal-updated.html";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    
    // 画面を元の状態に戻す
    renderCards();
    if(wasEditMode) toggleEditMode();
    
    alert("「sns-portal-updated.html」という名前でダウンロードしました！\n次回からはこの新しいファイルを使うか、GitHub等にアップロードしてください。");
}

// 初期描画
renderCards();
</script>

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCJwQooL2MHQq2fg8aeXWGDD2s8VfzKZ04",
      authDomain: "portal-app-25359.firebaseapp.com",
      projectId: "portal-app-25359",
      storageBucket: "portal-app-25359.firebasestorage.app",
      messagingSenderId: "148295764653",
      appId: "1:148295764653:web:fe588512833f88852a9424",
      measurementId: "G-MLM10WJPGN"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const loginSection = document.getElementById('login-section');
    const mainContent = document.getElementById('main-content');
    const userNameSpan = document.getElementById('user-name');

    // ログイン状態の監視
    onAuthStateChanged(auth, (user) => {
      if (user) {
        // ログインしている時
        loginSection.classList.add('hidden');
        mainContent.classList.remove('hidden');
        userNameSpan.textContent = user.displayName + " さん";
      } else {
        // ログインしていない時
        loginSection.classList.remove('hidden');
        mainContent.classList.add('hidden');
      }
    });

    // ログイン処理
    document.getElementById('login-btn').addEventListener('click', () => {
      signInWithPopup(auth, provider).catch((error) => {
        console.error("ログインエラー:", error);
        alert("ログインに失敗しました。");
      });
    });

    // ログアウト処理
    document.getElementById('logout-btn').addEventListener('click', () => {
      signOut(auth).catch((error) => console.error("ログアウトエラー:", error));
    });
</script>

</body>
</html>
