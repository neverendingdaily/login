<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNS Marketing Portal</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text x=%2250%%22 y=%2250%%22 style=%22dominant-baseline:central;text-anchor:middle;font-size:90px;%22>🚀</text></svg>">
    <style>
        :root{--bg-color:#fcfaf2;--card-bg:#fff;--card-hover:#fdfdf8;--text-main:#2c2925;--text-sub:#787168;--border-color:#ede8d9;--primary:#0369a1}
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:var(--bg-color);color:var(--text-main);margin:0;padding:2rem;display:flex;justify-content:center}
        
        /* コンテナの最大幅を広げ、PCで多列表示（最大6列程度）を可能にする */
        .container{max-width:1400px;width:100%}
        
        .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem; flex-wrap:wrap; gap:1rem;}
        h1{font-size:1.8rem;margin:0;letter-spacing:.05em}
        
        /* コントロールパネルのスタイル */
        .controls-top{display:flex;gap:0.5rem;}
        button{cursor:pointer;padding:0.5rem 1rem;border:none;border-radius:6px;font-weight:bold;font-size:0.9rem;transition:all 0.2s;}
        .btn-edit{background:#e2e8f0;color:#334155;}
        .btn-edit.active{background:#ef4444;color:white;}
        .btn-export{background:var(--primary);color:white;}
        
        /* フォームのスタイル */
        .add-form{background:#fff;padding:1.5rem;border-radius:12px;border:1px solid var(--border-color);margin-bottom:2rem;display:none;grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));gap:1rem;}
        .add-form.active{display:grid;}
        .form-group{display:flex;flex-direction:column;gap:0.3rem;}
        .form-group input, .form-group select{padding:0.5rem;border:1px solid #cbd5e1;border-radius:4px;font-size:0.9rem;}
        .form-full{grid-column:1 / -1;}
        .btn-add{background:#10b981;color:white;padding:0.8rem;grid-column:1 / -1;}

        /* 可変グリッド: ブラウザ幅に合わせて自動で列数が変わる */
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1.5rem}
        
        .card{background:var(--card-bg);border-radius:12px;padding:1.5rem;text-decoration:none;color:var(--text-main);transition:all .2s ease;border:1px solid var(--border-color);display:flex;flex-direction:column;box-shadow:0 2px 8px rgba(0,0,0,.02);position:relative;}
        .card:hover{transform:translateY(-3px);border-color:#cbd5e1;box-shadow:0 10px 20px rgba(0,0,0,.06)}
        
        .icon-wrap{font-size:2rem;margin-bottom:1rem;line-height:1}
        .favicon-img{width:40px;height:40px;object-fit:contain;border-radius:6px}
        .title{font-size:1.1rem;font-weight:bold;margin-bottom:.5rem}
        .desc{font-size:.85rem;color:var(--text-sub);line-height:1.4;flex-grow:1;}
        .badge{display:inline-block;padding:.2rem .5rem;border-radius:4px;font-size:.7rem;font-weight:bold;margin-bottom:1rem;width:fit-content}
        
        /* 編集モード時のカードのオーバーレイとボタン */
        .card-edit-overlay{display:none;position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,0.9);border-radius:12px;flex-direction:column;justify-content:center;align-items:center;gap:0.5rem;z-index:10;}
        .edit-mode .card-edit-overlay{display:flex;}
        .edit-mode.card:hover{transform:none;}
        .action-btn{padding:0.4rem 1rem;font-size:1.2rem;background:#f1f5f9;border:1px solid #cbd5e1;}
        .action-btn:hover{background:#e2e8f0;}
        .delete-btn{background:#fee2e2;color:#ef4444;border-color:#fca5a5;}
        
        .bg-blue{background:#e0f2fe;color:#0369a1}.bg-green{background:#dcfce7;color:#15803d}.bg-purple{background:#f3e8ff;color:#7e22ce}.bg-orange{background:#ffedd5;color:#c2410c}.bg-gray{background:#f3f4f6;color:#4b5563}.bg-red{background:#fee2e2;color:#b91c1c}.bg-yellow{background:#fef9c3;color:#854d0e}.bg-teal{background:#ccfbf1;color:#0f766e}
        
        /* ▼▼▼ プレミアムログイン画面用CSS ▼▼▼ */
        .hidden { display: none !important; }
        
        #login-section {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            display: flex; justify-content: center; align-items: center; z-index: 9999;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 3.5rem 3rem;
            border-radius: 24px;
            text-align: center;
            max-width: 420px;
            width: 90%;
            border: 1px solid rgba(255,255,255,0.8);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .login-logo {
            font-size: 3.5rem; margin-bottom: 1rem; line-height: 1;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .login-card h2 { margin: 0 0 0.5rem 0; color: #1e293b; font-size: 1.6rem; font-weight: 800; letter-spacing: -0.025em; }
        .login-desc { color: #64748b; font-size: 0.95rem; margin-bottom: 2.5rem; line-height: 1.6; }

        .btn-login-modern {
            background: #ffffff; color: #334155; border: 1px solid #e2e8f0;
            padding: 14px 24px; font-size: 1.05rem; font-weight: 600; border-radius: 12px; width: 100%;
            display: flex; align-items: center; justify-content: center; gap: 12px; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }

        .btn-login-modern:hover {
            background: #f8fafc; border-color: #cbd5e1; transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        .btn-login-modern:active { transform: translateY(0); }
        .google-icon { width: 24px; height: 24px; }
        .login-footer { margin-top: 2rem; font-size: 0.8rem; color: #94a3b8; }

        .user-info { display: flex; align-items: center; gap: 10px; font-size: 0.9rem; font-weight: bold; }
        .btn-logout { background: #f1f5f9; color: #334155; padding: 5px 10px; font-size: 0.8rem; border:none; border-radius:6px; cursor:pointer;}
        .btn-logout:hover { background: #e2e8f0; }
        
        .loading-text { text-align: center; color: #0369a1; font-weight: bold; padding: 2rem; grid-column: 1 / -1; }

        @media (max-width: 600px) {
            .header { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>

<div id="login-section">
    <div class="login-card">
        <div class="login-logo">🚀</div>
        <h2>SNS Marketing Portal</h2>
        <p class="login-desc">統合マーケティングシステムへようこそ。<br>続行するにはログインしてください。</p>
        <button id="login-btn" class="btn-login-modern">
            <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" class="google-icon">
            Google アカウントでログイン
        </button>
        <p class="login-footer">※許可されたクリエイターのみアクセス可能です</p>
    </div>
</div>
<div class="container hidden" id="main-content">
    <div class="header">
        <h1>🚀 Marketing System Portal</h1>
        <div class="user-info">
            <span id="user-name"></span>
            <button id="logout-btn" class="btn-logout">ログアウト</button>
        </div>
        <div class="controls-top">
            <button class="btn-edit" id="toggle-edit" onclick="toggleEditMode()">編集モード ON</button>
            <button class="btn-export" onclick="exportHTML()">💾 HTMLバックアップ</button>
        </div>
    </div>

    <div class="add-form" id="add-form">
        <div class="form-group">
            <label>タイトル</label>
            <input type="text" id="f-title" placeholder="例: 新しいツール">
        </div>
        <div class="form-group">
            <label>URL</label>
            <input type="text" id="f-url" placeholder="https://...">
        </div>
        <div class="form-group">
            <label>アイコン (絵文字)</label>
            <input type="text" id="f-icon" placeholder="例: 🎯 (空欄ならファビコン)">
        </div>
        <div class="form-group">
            <label>バッジ表示名</label>
            <input type="text" id="f-badge-text" placeholder="例: Tool">
        </div>
        <div class="form-group">
            <label>バッジの色</label>
            <select id="f-badge-class">
                <option value="bg-purple">紫 (Core/AI)</option>
                <option value="bg-gray">グレー (Research)</option>
                <option value="bg-red">赤 (Analysis)</option>
                <option value="bg-yellow">黄 (Ideation)</option>
                <option value="bg-green">緑 (Planning)</option>
                <option value="bg-orange">オレンジ (Creative)</option>
                <option value="bg-blue" selected="">青 (Tool/Studio)</option>
                <option value="bg-teal">ティール (Design)</option>
            </select>
        </div>
        <div class="form-group form-full">
            <label>説明文</label>
            <input type="text" id="f-desc" placeholder="ツールの概要や用途を入力">
        </div>
        <button class="btn-add" onclick="addSite()">+ クラウドに追加</button>
    </div>

    <div class="grid" id="g">
        <div class="loading-text">データを読み込んでいます...</div>
    </div>
</div>

<script type="module">
    // ① Firebaseのシステムを読み込む
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-auth.js";
    // 🌟 今回追加：Firestore（クラウドデータベース）の機能を読み込む
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore.js";

    // ② あなたの鍵
    const firebaseConfig = {
      apiKey: "AIzaSyCJwQooL2MHQq2fg8aeXWGDD2s8VfzKZ04",
      authDomain: "portal-app-25359.firebaseapp.com",
      projectId: "portal-app-25359",
      storageBucket: "portal-app-25359.firebasestorage.app",
      messagingSenderId: "148295764653",
      appId: "1:148295764653:web:fe588512833f88852a9424",
      measurementId: "G-MLM10WJPGN"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();
    const db = getFirestore(app); // データベースの起動

    // ③ 画面パーツとデータの準備
    const loginSection = document.getElementById('login-section');
    const mainContent = document.getElementById('main-content');
    const userNameSpan = document.getElementById('user-name');
    
    const dataScript = document.getElementById('site-data');
    const originalData = JSON.parse(dataScript.textContent);
    
    let L = []; // ツールのリスト（後でクラウドから読み込みます）
    let isEditMode = false;
    let currentUser = null; // ログインしているユーザーの情報を保存

    // ④ ログイン状態の監視とクラウドデータの取得
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        // ログイン成功！
        currentUser = user;
        loginSection.classList.add('hidden');
        mainContent.classList.remove('hidden');
        userNameSpan.textContent = user.displayName + " さん";

        // 🌟 クラウドから「あなた専用のツール一覧」を取得する処理
        try {
            const userDoc = await getDoc(doc(db, "users", user.uid));
            if (userDoc.exists()) {
                // すでにクラウドに保存されている場合
                L = userDoc.data().tools;
            } else {
                // 初めてのログインの場合（初期データをクラウドに書き込む）
                L = JSON.parse(localStorage.getItem('my_portal_data')) || originalData;
                await setDoc(doc(db, "users", user.uid), { tools: L });
            }
            renderCards(); // データを取得してから画面にカードを描画
        } catch (error) {
            console.error("クラウドからのデータ取得に失敗しました:", error);
            // 失敗時はローカルデータで代用
            L = JSON.parse(localStorage.getItem('my_portal_data')) || originalData;
            renderCards();
        }

      } else {
        // 未ログイン時
        currentUser = null;
        loginSection.classList.remove('hidden');
        mainContent.classList.add('hidden');
      }
    });

    // ⑤ ログイン・ログアウトボタンの動作
    document.getElementById('login-btn').addEventListener('click', () => {
      signInWithPopup(auth, provider).catch((error) => {
        console.error("ログインエラー:", error);
        alert("ログインに失敗しました。");
      });
    });

    document.getElementById('logout-btn').addEventListener('click', () => {
      signOut(auth).catch((error) => console.error("ログアウトエラー:", error));
    });


    // ==========================================
    // 以降はポータルサイトの便利機能（描画、編集、並び替え）
    // ==========================================

    function renderCards() {
        const g = document.getElementById('g');
        g.innerHTML = '';
        
        L.forEach((l, index) => {
            const wrapper = document.createElement(isEditMode ? 'div' : 'a');
            if(!isEditMode) {
                wrapper.href = l.url;
                wrapper.target = '_blank';
            }
            wrapper.className = 'card' + (isEditMode ? ' edit-mode' : '');
            
            const hasEmoji = l.icon && l.icon.trim() !== '';
            const fav = (u) => { try{ return 'https://www.google.com/s2/favicons?sz=64&domain=' + encodeURIComponent(new URL(u).hostname); }catch(e){ return ''; } }
            
            const ico = hasEmoji
                ? `<div class="icon-wrap">${l.icon}</div>`
                : `<div class="icon-wrap"><img class="favicon-img" src="${fav(l.url)}" alt="" onerror="this.style.display='none'"></div>`;
                
            let inner = `<span class="badge ${l.badgeClass}">${l.badgeText}</span>${ico}<div class="title">${l.title}</div><div class="desc">${l.desc}</div>`;
            
            if(isEditMode) {
                inner += `
                <div class="card-edit-overlay">
                    <div style="display:flex;gap:0.5rem;margin-bottom:0.5rem;">
                        <button class="action-btn" onclick="moveUp(${index}, event)">◀ 前へ</button>
                        <button class="action-btn" onclick="moveDown(${index}, event)">次へ ▶</button>
                    </div>
                    <button class="action-btn delete-btn" onclick="deleteSite(${index}, event)">🗑️ 削除</button>
                </div>`;
            }
            
            wrapper.innerHTML = inner;
            g.appendChild(wrapper);
        });
    }

    // 🌟 変更や追加があったときに、クラウドに同期する関数
    async function saveData() {
        // オフラインの時のためにローカルにも一応保存
        localStorage.setItem('my_portal_data', JSON.stringify(L));
        renderCards();

        // ログイン中なら、変更をクラウド（Firestore）に送信！
        if (currentUser) {
            try {
                await setDoc(doc(db, "users", currentUser.uid), { tools: L });
                console.log("クラウドに同期しました");
            } catch (error) {
                console.error("クラウドへの同期に失敗しました:", error);
            }
        }
    }

    function toggleEditMode() {
        isEditMode = !isEditMode;
        const btn = document.getElementById('toggle-edit');
        const form = document.getElementById('add-form');
        
        if(isEditMode) {
            btn.textContent = "編集モード OFF";
            btn.classList.add('active');
            form.classList.add('active');
        } else {
            btn.textContent = "編集モード ON";
            btn.classList.remove('active');
            form.classList.remove('active');
        }
        renderCards();
    }

    function moveUp(index, event) {
        event.stopPropagation();
        if(index > 0) {
            [L[index - 1], L[index]] = [L[index], L[index - 1]];
            saveData(); // ここでクラウドへ同期！
        }
    }

    function moveDown(index, event) {
        event.stopPropagation();
        if(index < L.length - 1) {
            [L[index + 1], L[index]] = [L[index], L[index + 1]];
            saveData(); // ここでクラウドへ同期！
        }
    }

    function deleteSite(index, event) {
        event.stopPropagation();
        if(confirm("このサイトをリストから削除しますか？")) {
            L.splice(index, 1);
            saveData(); // ここでクラウドへ同期！
        }
    }

    function addSite() {
        const title = document.getElementById('f-title').value;
        const url = document.getElementById('f-url').value;
        if(!title || !url) return alert("タイトルとURLは必須です");
        
        const newSite = {
            title: title,
            url: url,
            icon: document.getElementById('f-icon').value,
            badgeText: document.getElementById('f-badge-text').value || "New",
            badgeClass: document.getElementById('f-badge-class').value,
            desc: document.getElementById('f-desc').value
        };
        
        L.push(newSite);
        saveData(); // ここでクラウドへ同期！
        
        document.getElementById('f-title').value = '';
        document.getElementById('f-url').value = '';
        document.getElementById('f-desc').value = '';
        alert("追加・同期しました！");
    }

    function exportHTML() {
        dataScript.textContent = "\n" + JSON.stringify(L, null, 2) + "\n";
        const wasEditMode = isEditMode;
        if(wasEditMode) toggleEditMode();
        document.getElementById('g').innerHTML = '';
        
        const htmlContent = "<!DOCTYPE html>\n<html lang=\"ja\">\n" + document.documentElement.innerHTML + "\n</html>";
        const blob = new Blob([htmlContent], { type: "text/html" });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "sns-portal-updated.html";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        
        renderCards();
        if(wasEditMode) toggleEditMode();
        alert("バックアップ用HTMLをダウンロードしました。");
    }

    // ★ HTMLのボタンから呼び出せるように、関数を全体(window)に登録
    window.toggleEditMode = toggleEditMode;
    window.moveUp = moveUp;
    window.moveDown = moveDown;
    window.deleteSite = deleteSite;
    window.addSite = addSite;
    window.exportHTML = exportHTML;

</script>
</body>
</html>
